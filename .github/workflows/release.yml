name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-release
  cancel-in-progress: false

env:
  LIBSODIUM_UPSTREAM_VERSION: 1.0.18
  SYFT_VERSION: 1.44.0
  SYFT_SHA256: 0e91737aee2b5baf1d255b959630194a302335d848ff97bb07921eb6205b5f5a
  PARLAY_VERSION: 0.11.0
  PARLAY_SHA256: 2654d8e91c53f8e264f439684f657fc0139a8c13d842c30aa4f12c9cc9be1243
  PARLAY_SNYK_ENRICH: 0
  SBOM_SOURCE_NAME: salt
  SBOM_SOURCE_SUPPLIER: CTFfactory
  PROJECT_URL: https://github.com/CTFfactory/salt
  SBOM_LICENSE: Unlicense
  SBOM_COPYRIGHT: Copyright 2026 CTFfactory
  SBOM_FILE_METADATA_SELECTION: all
  SBOM_BUILD_TOOL_CC: gcc
  SBOM_BUILD_TOOL_CLANG: clang
  SBOM_BUILD_TOOL_MAKE: make
  SBOM_BUILD_TOOL_LIBC_DEV: libc6-dev
  SBOM_BUILD_TOOL_LDD: libc-bin
  SBOM_BUILD_TOOL_BINUTILS: binutils
  SBOM_BUILD_TOOL_AUTOCONF: autoconf
  SBOM_BUILD_TOOL_AUTOMAKE: automake
  SBOM_BUILD_TOOL_LIBTOOL: libtool
  SBOM_BUILD_TOOL_PKG_CONFIG: pkg-config

jobs:
  release-check:
    name: Release Quality Gate
    permissions:
      contents: read
    runs-on: ubuntu-24.04
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install runner prerequisites
        run: ./scripts/install-ci-runner.sh

      - name: Verify runner prerequisites
        run: ./scripts/check-ci-runner.sh

      - name: Validate SemVer tag
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"
          if ! printf '%s' "$tag" | grep -qE '^v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?(\+[0-9A-Za-z.-]+)?$'; then
            echo "ERROR: tag $tag is not a valid SemVer tag (expected v*.*.*)" >&2
            exit 1
          fi
          echo "OK: tag $tag is valid SemVer"

      - name: Bootstrap Autotools
        run: ./bootstrap

      - name: Configure out-of-tree build
        run: |
          mkdir -p build/autotools
          cd build/autotools
          ../../configure --enable-tests

      - name: Run full gate
        run: |
          cd build/autotools
          make ci

      - name: Build Release Binaries
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#v}"
          cd build/autotools
          make clean
          make release SALT_VERSION="${version}"
          strip salt
          strip salt-static

          # Keep minimal staging for SBOM generation (use consistent sbom/staging/ directory).
          rm -rf ../../sbom/staging ../../release-template
          mkdir -p ../../sbom/staging/dynamic ../../sbom/staging/static
          cp salt ../../sbom/staging/dynamic/salt
          cp ../../man/salt.1 ../../sbom/staging/dynamic/salt.1
          cp salt-static ../../sbom/staging/static/salt-static
          cp ../../man/salt.1 ../../sbom/staging/static/salt.1

          # Build template-style tarball staging from canonical source/build outputs.
          make coverage-html
          stage="../../release-template/salt.tar"
          mkdir -p \
            "${stage}/bin" \
            "${stage}/coverage/dark" \
            "${stage}/coverage/light" \
            "${stage}/man/man1" \
            "${stage}/scripts"
          cp ../../CONTRIBUTING.md "${stage}/CONTRIBUTING.md"
          cp ../../INSTALL.md "${stage}/INSTALL.md"
          cp ../../LICENSE "${stage}/LICENSE"
          cp ../../README.md "${stage}/README.md"
          cp ../../SECURITY.md "${stage}/SECURITY.md"
          cp ../../TESTING.md "${stage}/TESTING.md"
          cp ../../CHANGELOG.md "${stage}/CHANGELOG.md"
          cp ../../man/salt.1 "${stage}/man/man1/salt.1"
          cp ../../examples/set-repo-secret.sh "${stage}/scripts/set-repo-secret.sh"
          cp ../../examples/set-org-secret.sh "${stage}/scripts/set-org-secret.sh"
          cp ../../examples/set-environment-secret.sh "${stage}/scripts/set-environment-secret.sh"
          cp -a coverage/dark/. "${stage}/coverage/dark/"
          cp -a coverage/light/. "${stage}/coverage/light/"
          cp salt "${stage}/bin/salt"
          cp salt-static "${stage}/bin/salt-static"
          cd ../..

          # Create archives with deterministic template structure.
          tar -czf salt-linux-amd64.tar.gz -C release-template salt.tar

      - name: Smoke test stripped binaries
        run: |
          set -euo pipefail
          ./build/autotools/salt --version
          ./build/autotools/salt-static --version
          echo "OK: stripped binaries execute"

      - name: Validate archive extraction
        run: |
          set -euo pipefail
          mkdir -p archive-test

          tar -xzf salt-linux-amd64.tar.gz -C archive-test
          if [ ! -x archive-test/salt.tar/bin/salt ]; then
            echo "ERROR: salt binary missing or not executable in archive template" >&2
            exit 1
          fi
          if [ ! -x archive-test/salt.tar/bin/salt-static ]; then
            echo "ERROR: salt-static binary missing or not executable in archive template" >&2
            exit 1
          fi
          if [ ! -f archive-test/salt.tar/man/man1/salt.1 ]; then
            echo "ERROR: salt.1 man page missing in archive template" >&2
            exit 1
          fi
          for file in CONTRIBUTING.md INSTALL.md LICENSE README.md SECURITY.md TESTING.md CHANGELOG.md; do
            if [ ! -f "archive-test/salt.tar/${file}" ]; then
              echo "ERROR: ${file} missing in archive template" >&2
              exit 1
            fi
          done
          for script in set-repo-secret.sh set-org-secret.sh set-environment-secret.sh; do
            if [ ! -f "archive-test/salt.tar/scripts/${script}" ]; then
              echo "ERROR: ${script} missing in archive template" >&2
              exit 1
            fi
          done
          if [ ! -f archive-test/salt.tar/coverage/dark/index.html ] || [ ! -f archive-test/salt.tar/coverage/light/index.html ]; then
            echo "ERROR: coverage index files missing in archive template" >&2
            exit 1
          fi
          archive-test/salt.tar/bin/salt --version
          archive-test/salt.tar/bin/salt-static --version
          echo "OK: archive template extracts and both binaries execute"

      - name: Build Debian package
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#v}"
          cd build/autotools
          make package-deb-local SALT_PACKAGE_VERSION="${version}" UBUNTU_VERSION="22" SALT_PACKAGE_RELEASE="1ubuntu22"
          cp packages/*.deb ../..
          cd ../..
          ls -l salt_*_amd64.deb

      - name: Install SBOM tools
        run: |
          set -euo pipefail
          mkdir -p build/tools
          syft_tarball="syft_${SYFT_VERSION}_linux_amd64.tar.gz"
          curl -fsSL -o "build/tools/${syft_tarball}" "https://github.com/anchore/syft/releases/download/v${SYFT_VERSION}/${syft_tarball}"
          echo "${SYFT_SHA256}  build/tools/${syft_tarball}" | sha256sum -c -
          tar -xzf "build/tools/${syft_tarball}" -C build/tools syft
          rm -f "build/tools/${syft_tarball}"
          build/tools/syft version

          parlay_tarball="parlay_${PARLAY_VERSION}_Linux_x86_64.tar.gz"
          curl -fsSL -o "build/tools/${parlay_tarball}" "https://github.com/snyk/parlay/releases/download/v${PARLAY_VERSION}/parlay_Linux_x86_64.tar.gz"
          echo "${PARLAY_SHA256}  build/tools/${parlay_tarball}" | sha256sum -c -
          tar -xzf "build/tools/${parlay_tarball}" -C build/tools parlay
          rm -f "build/tools/${parlay_tarball}"
          build/tools/parlay --version

      - name: Generate SBOMs
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#v}"
          source_ref="refs/tags/${GITHUB_REF_NAME}"
          SYFT_FILE_METADATA_SELECTION="${SBOM_FILE_METADATA_SELECTION}" build/tools/syft dir:sbom/staging/dynamic \
            --source-name "${SBOM_SOURCE_NAME}" \
            --source-supplier "${SBOM_SOURCE_SUPPLIER}" \
            --source-version "${version}" \
            -o spdx-json=salt-linux-amd64.spdx.json \
            -o cyclonedx-json=salt-linux-amd64.cyclonedx.json
          SYFT_FILE_METADATA_SELECTION="${SBOM_FILE_METADATA_SELECTION}" build/tools/syft dir:sbom/staging/static \
            --source-name "${SBOM_SOURCE_NAME}" \
            --source-supplier "${SBOM_SOURCE_SUPPLIER}" \
            --source-version "${version}" \
            -o spdx-json=salt-static-linux-amd64.spdx.json \
            -o cyclonedx-json=salt-static-linux-amd64.cyclonedx.json
          ./scripts/collect-ubuntu-deps.sh --output ubuntu-build-provenance.json --root "libsodium23:libsodium-runtime" --root "libsodium-dev:libsodium-build" --root "${SBOM_BUILD_TOOL_CC}:salt-build-tool" --root "${SBOM_BUILD_TOOL_CLANG}:salt-build-tool" --root "${SBOM_BUILD_TOOL_MAKE}:salt-build-tool" --root "${SBOM_BUILD_TOOL_LIBC_DEV}:salt-build-tool" --root "${SBOM_BUILD_TOOL_LDD}:salt-build-tool" --root "${SBOM_BUILD_TOOL_BINUTILS}:salt-build-tool" --root "${SBOM_BUILD_TOOL_AUTOCONF}:salt-build-tool" --root "${SBOM_BUILD_TOOL_AUTOMAKE}:salt-build-tool" --root "${SBOM_BUILD_TOOL_LIBTOOL}:salt-build-tool" --root "${SBOM_BUILD_TOOL_PKG_CONFIG}:salt-build-tool"
          ./scripts/add-libsodium-to-sbom.sh --project-url "${PROJECT_URL}" --license "${SBOM_LICENSE}" --copyright "${SBOM_COPYRIGHT}" --version "${LIBSODIUM_UPSTREAM_VERSION}" --salt-version "${version}" --source-ref "${source_ref}" --artifact-file "salt=sbom/staging/dynamic/salt" --artifact-file "salt.1=sbom/staging/dynamic/salt.1" salt-linux-amd64.spdx.json salt-linux-amd64.cyclonedx.json
          ./scripts/add-libsodium-to-sbom.sh --project-url "${PROJECT_URL}" --license "${SBOM_LICENSE}" --copyright "${SBOM_COPYRIGHT}" --version "${LIBSODIUM_UPSTREAM_VERSION}" --salt-version "${version}" --source-ref "${source_ref}" --artifact-file "salt-static=sbom/staging/static/salt-static" --artifact-file "salt.1=sbom/staging/static/salt.1" salt-static-linux-amd64.spdx.json salt-static-linux-amd64.cyclonedx.json
          ./scripts/add-ubuntu-provenance-to-sbom.sh --deps ubuntu-build-provenance.json salt-linux-amd64.cyclonedx.json salt-static-linux-amd64.cyclonedx.json
          cd build/autotools
          make --no-print-directory sbom-parlay-run \
            PARLAY_BIN="../tools/parlay" \
            PARLAY_SBOMS="../../salt-linux-amd64.spdx.json ../../salt-static-linux-amd64.spdx.json ../../salt-linux-amd64.cyclonedx.json ../../salt-static-linux-amd64.cyclonedx.json" \
            PARLAY_SNYK_ENRICH="${PARLAY_SNYK_ENRICH}"
          cd ../..
          ./scripts/validate-sbom.sh --salt-version "${version}" --ubuntu-deps ubuntu-build-provenance.json --spdx salt-linux-amd64.spdx.json:salt --spdx salt-static-linux-amd64.spdx.json:salt-static --cyclonedx salt-linux-amd64.cyclonedx.json:salt --cyclonedx salt-static-linux-amd64.cyclonedx.json:salt-static
          echo "OK: release SBOMs generated and validated"

      - name: Verify checksums
        run: |
          set -euo pipefail
          sha256sum \
            salt-linux-amd64.tar.gz \
            salt-linux-amd64.spdx.json \
            salt-static-linux-amd64.spdx.json \
            salt-linux-amd64.cyclonedx.json \
            salt-static-linux-amd64.cyclonedx.json \
            salt_*_amd64.deb \
            > SHA256SUMS
          sha256sum -c SHA256SUMS
          echo "OK: SHA256SUMS verified"

      - name: Extract changelog notes
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#v}"
          # Escape regex metacharacters in version before substituting into awk pattern.
          # shellcheck disable=SC2016 # sed pattern intentionally treats $ as a regex literal
          escaped_version=$(printf '%s' "${version}" | sed -e 's/[][\\.*^$(){}?+|/]/\\&/g')
          awk '/^## \['"${escaped_version}"'\]/{flag=1;next}/^(## \[|<!--|\[)/{if(flag){exit}}flag' CHANGELOG.md > release-notes.md
          if ! test -s release-notes.md; then
            echo "missing changelog notes for version ${version}" >&2
            exit 1
          fi

      - name: Upload release bundle
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-bundle
          path: |
            salt-linux-amd64.tar.gz
            salt-linux-amd64.spdx.json
            salt-static-linux-amd64.spdx.json
            salt-linux-amd64.cyclonedx.json
            salt-static-linux-amd64.cyclonedx.json
            salt_*_amd64.deb
            SHA256SUMS
            release-notes.md
          retention-days: 7

  publish-release:
    name: Publish GitHub Release
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    needs: release-check
    permissions:
      contents: write
    steps:
      - name: Download release bundle
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: release-bundle
          path: release-bundle

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          files: |
            release-bundle/salt-linux-amd64.tar.gz
            release-bundle/salt-linux-amd64.spdx.json
            release-bundle/salt-static-linux-amd64.spdx.json
            release-bundle/salt-linux-amd64.cyclonedx.json
            release-bundle/salt-static-linux-amd64.cyclonedx.json
            release-bundle/salt_*_amd64.deb
            release-bundle/SHA256SUMS
          body_path: release-bundle/release-notes.md
