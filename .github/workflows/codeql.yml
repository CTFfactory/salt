---
name: codeql

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly Sunday 06:00 UTC scan keeps coverage fresh against the
    # CodeQL query database even when there are no source changes.
    - cron: '0 6 * * 0'

permissions:
  contents: read

env:
  AUTOCONF_VERSION: 2.71-3
  AUTOMAKE_VERSION: 1:1.16.5-1.3ubuntu1
  LIBTOOL_VERSION: 2.4.7-7build1
  PKG_CONFIG_VERSION: 1.8.1-2build1
  GCC_VERSION: 4:13.2.0-7ubuntu1
  LIBC6_DEV_VERSION: 2.39-0ubuntu8.7
  LIBSODIUM_DEV_VERSION: 1.0.18-1ubuntu0.24.04.1
  LIBCMOCKA_DEV_VERSION: 1.1.7-3
  MAKE_VERSION: 4.3-4.1build2

jobs:
  analyze:
    name: codeql-cpp
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    permissions:
      security-events: write
      packages: read
      actions: read
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Install build dependencies
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            autoconf="${AUTOCONF_VERSION}" \
            automake="${AUTOMAKE_VERSION}" \
            libtool="${LIBTOOL_VERSION}" \
            pkg-config="${PKG_CONFIG_VERSION}" \
            gcc="${GCC_VERSION}" \
            libc6-dev="${LIBC6_DEV_VERSION}" \
            libsodium-dev="${LIBSODIUM_DEV_VERSION}" \
            libcmocka-dev="${LIBCMOCKA_DEV_VERSION}" \
            make="${MAKE_VERSION}"

      - name: Initialize CodeQL
        uses: github/codeql-action/init@e46ed2cbd01164d986452f91f178727624ae40d7  # v4.31.2
        with:
          languages: c-cpp
          queries: security-and-quality

      - name: Bootstrap autotools
        run: ./bootstrap

      - name: Configure out-of-tree build
        run: |
          mkdir -p build/autotools
          cd build/autotools
          ../../configure --enable-tests

      - name: Build for analysis
        run: |
          cd build/autotools
          make all test_salt

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@e46ed2cbd01164d986452f91f178727624ae40d7  # v4.31.2
        with:
          category: "/language:c-cpp"
