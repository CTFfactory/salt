---
name: codeql

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
  schedule:
    # Weekly Sunday 06:00 UTC scan keeps coverage fresh against the
    # CodeQL query database even when there are no source changes.
    - cron: '0 6 * * 0'

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  SALT_CI_UBUNTU_VERSION: '24.04'
  SALT_CI_ALLOW_DYNAMIC_APT_REPOS: '0'

jobs:
  analyze:
    name: codeql-cpp
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    permissions:
      security-events: write
      packages: read
      actions: read
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Install runner prerequisites
        run: ./scripts/install-ci-runner.sh

      - name: Verify runner prerequisites
        run: ./scripts/check-ci-runner.sh

      - name: Initialize CodeQL
        uses: github/codeql-action/init@68bde559dea0fdcac2102bfdf6230c5f70eb485e  # v4.35.4
        with:
          languages: c-cpp
          config-file: .github/codeql-config.yml

      - name: Bootstrap autotools
        run: ./bootstrap

      - name: Configure out-of-tree build
        run: |
          mkdir -p build/autotools
          cd build/autotools
          ../../configure --enable-tests

      - name: Build for analysis (production CLI + tests)
        run: |
          cd build/autotools
          make all test_salt

      - name: Build fuzzing harnesses for analysis
        if: github.event_name != 'pull_request'
        continue-on-error: true
        run: |
          cd build/autotools
          make fuzz-build

      - name: Build benchmark harnesses for analysis
        if: github.event_name != 'pull_request'
        continue-on-error: true
        run: |
          cd build/autotools
          make bench-build

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@68bde559dea0fdcac2102bfdf6230c5f70eb485e  # v4.35.4
        with:
          category: "/language:c-cpp"

      - name: Report CodeQL results
        if: always()
        run: |
          set -euo pipefail
          echo "CodeQL analysis complete. Review results in Security tab."
          echo "- Query suite: security-extended"
          echo "- Configuration: .github/codeql-config.yml"
          echo "- Coverage: src/, include/, fuzz/, bench/, tests/"
          echo "- Policy: .github/instructions/codeql-findings.instructions.md"
