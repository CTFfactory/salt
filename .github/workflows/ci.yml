name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  LIBSODIUM_DEV_VERSION: 1.0.18-1ubuntu0.24.04.1
  LIBCMOCKA_DEV_VERSION: 1.1.7-3
  MAKE_VERSION: 4.3-4.1build2
  MAN_DB_VERSION: 2.12.0-4build2
  GCOVR_VERSION: 7.0-1
  VALGRIND_VERSION: 1:3.22.0-0ubuntu1
  CLANG_FORMAT_VERSION: 1:18.1.3-1ubuntu1
  CLANG_TIDY_VERSION: 1:18.1.3-1ubuntu1
  CLANG_VERSION: 1:18.1.3-1ubuntu1
  CPPCHECK_VERSION: 2.13.0-2ubuntu3
  SHELLCHECK_VERSION: 0.9.0-1
  CODESPELL_VERSION: 2.2.6-1
  AUTOCONF_VERSION: 2.71-3
  AUTOMAKE_VERSION: 1:1.16.5-1.3ubuntu1
  LIBTOOL_VERSION: 2.4.7-7build1
  PKG_CONFIG_VERSION: 1.8.1-2build1

jobs:
  copilot-config:
    name: Copilot Config Gate
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Validate Copilot customization
        run: ./scripts/validate-copilot-config.sh .

  actionlint:
    name: Workflow Lint
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Bootstrap GNU build files
        run: ./bootstrap
      - name: Configure out-of-tree build
        run: |
          mkdir -p build/autotools
          cd build/autotools
          ../../configure --enable-tests
      - name: Run actionlint
        run: |
          cd build/autotools
          make actionlint

  ci-fast:
    name: Fast Gate
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    needs: [copilot-config, actionlint]
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Bootstrap GNU build files
        run: ./bootstrap
      - name: Cache APT archives
        uses: actions/cache@0400d5f644dc74513175e3cd8d07132dd4860809 # v4.2.4
        with:
          path: /var/cache/apt/archives
          key: apt-24.04-fast-${{ env.LIBSODIUM_DEV_VERSION }}-${{ env.LIBCMOCKA_DEV_VERSION }}-${{ env.MAKE_VERSION }}-${{ env.MAN_DB_VERSION }}-${{ env.CLANG_FORMAT_VERSION }}-${{ env.CLANG_TIDY_VERSION }}-${{ env.CPPCHECK_VERSION }}-${{ env.SHELLCHECK_VERSION }}-${{ env.CODESPELL_VERSION }}
      - name: Install dependencies
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y \
            libsodium-dev="${LIBSODIUM_DEV_VERSION}" \
            libcmocka-dev="${LIBCMOCKA_DEV_VERSION}" \
            make="${MAKE_VERSION}" \
            man-db="${MAN_DB_VERSION}" \
            clang-format-18="${CLANG_FORMAT_VERSION}" \
            clang-tidy-18="${CLANG_TIDY_VERSION}" \
            cppcheck="${CPPCHECK_VERSION}" \
            shellcheck="${SHELLCHECK_VERSION}" \
            codespell="${CODESPELL_VERSION}"
      - name: Configure out-of-tree build
        run: |
          mkdir -p build/autotools
          cd build/autotools
          ../../configure --enable-tests
      - name: Run fast gate
        run: |
          cd build/autotools
          make ci-fast

  ci-gcc-matrix:
    name: GCC Matrix (v${{ matrix.gcc_version }})
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    needs: ci-fast
    strategy:
      fail-fast: false
      matrix:
        gcc_version: [9, 10, 11, 12, 13]
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Bootstrap GNU build files
        run: ./bootstrap
      - name: Cache APT archives
        uses: actions/cache@0400d5f644dc74513175e3cd8d07132dd4860809 # v4.2.4
        with:
          path: /var/cache/apt/archives
          key: apt-24.04-gcc-${{ matrix.gcc_version }}-${{ env.LIBSODIUM_DEV_VERSION }}-${{ env.LIBCMOCKA_DEV_VERSION }}-${{ env.MAKE_VERSION }}-${{ env.MAN_DB_VERSION }}
      - name: Install dependencies
        run: |
          set -euo pipefail
          case "${{ matrix.gcc_version }}" in
            9) gcc_pkg='gcc-9=9.5.0-6ubuntu2.1' ;;
            10) gcc_pkg='gcc-10=10.5.0-4ubuntu2.1' ;;
            11) gcc_pkg='gcc-11=11.5.0-1ubuntu1~24.04.1' ;;
            12) gcc_pkg='gcc-12=12.4.0-2ubuntu1~24.04.1' ;;
            13) gcc_pkg='gcc-13=13.3.0-6ubuntu2~24.04.1' ;;
            *) echo "unsupported gcc version"; exit 1 ;;
          esac
          sudo apt-get update
          sudo apt-get install -y \
            "${gcc_pkg}" \
            libsodium-dev="${LIBSODIUM_DEV_VERSION}" \
            libcmocka-dev="${LIBCMOCKA_DEV_VERSION}" \
            make="${MAKE_VERSION}" \
            man-db="${MAN_DB_VERSION}"
      - name: Configure out-of-tree build
        run: |
          mkdir -p build/autotools
          cd build/autotools
          ../../configure --enable-tests CC="gcc-${{ matrix.gcc_version }}"
      - name: Run tests with matrix compiler
        run: |
          cd build/autotools
          make test

  ci-autotools:
    name: Full Gate (GNU Autotools)
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    needs: ci-fast
    env:
      CLANG: clang-18
      FUZZ_CC: clang-18
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Cache APT archives
        uses: actions/cache@0400d5f644dc74513175e3cd8d07132dd4860809 # v4.2.4
        with:
          path: /var/cache/apt/archives
          key: apt-24.04-autotools-${{ env.AUTOCONF_VERSION }}-${{ env.AUTOMAKE_VERSION }}-${{ env.LIBTOOL_VERSION }}-${{ env.PKG_CONFIG_VERSION }}-${{ env.LIBSODIUM_DEV_VERSION }}-${{ env.LIBCMOCKA_DEV_VERSION }}-${{ env.MAKE_VERSION }}-${{ env.MAN_DB_VERSION }}-${{ env.GCOVR_VERSION }}-${{ env.VALGRIND_VERSION }}-${{ env.CLANG_VERSION }}-${{ env.CLANG_FORMAT_VERSION }}-${{ env.CLANG_TIDY_VERSION }}-${{ env.CPPCHECK_VERSION }}-${{ env.SHELLCHECK_VERSION }}-${{ env.CODESPELL_VERSION }}
      - name: Install dependencies
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y \
            autoconf="${AUTOCONF_VERSION}" \
            automake="${AUTOMAKE_VERSION}" \
            libtool="${LIBTOOL_VERSION}" \
            pkg-config="${PKG_CONFIG_VERSION}" \
            libsodium-dev="${LIBSODIUM_DEV_VERSION}" \
            libcmocka-dev="${LIBCMOCKA_DEV_VERSION}" \
            make="${MAKE_VERSION}" \
            man-db="${MAN_DB_VERSION}" \
            gcovr="${GCOVR_VERSION}" \
            valgrind="${VALGRIND_VERSION}" \
            clang-18="${CLANG_VERSION}" \
            clang-format-18="${CLANG_FORMAT_VERSION}" \
            clang-tidy-18="${CLANG_TIDY_VERSION}" \
            cppcheck="${CPPCHECK_VERSION}" \
            shellcheck="${SHELLCHECK_VERSION}" \
            codespell="${CODESPELL_VERSION}"
      - name: Run Autotools full CI gate
        run: |
          set -euo pipefail
          ./bootstrap
          mkdir -p build/autotools
          cd build/autotools
          ../../configure --enable-tests
          make ci
      - name: Upload diagnostics on failure
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: ci-diagnostics
          path: |
            build/autotools/gcovr.txt
            build/autotools/gcov_blocks.txt
            build/autotools/*.gcov.json.gz
          retention-days: 7

  ci-clang:
    name: Clang Gate
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    needs: ci-fast
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Bootstrap GNU build files
        run: ./bootstrap
      - name: Cache APT archives
        uses: actions/cache@0400d5f644dc74513175e3cd8d07132dd4860809 # v4.2.4
        with:
          path: /var/cache/apt/archives
          key: apt-24.04-clang-${{ env.CLANG_VERSION }}-${{ env.LIBSODIUM_DEV_VERSION }}-${{ env.LIBCMOCKA_DEV_VERSION }}-${{ env.MAKE_VERSION }}-${{ env.MAN_DB_VERSION }}
      - name: Install dependencies
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y \
            clang-18="${CLANG_VERSION}" \
            libsodium-dev="${LIBSODIUM_DEV_VERSION}" \
            libcmocka-dev="${LIBCMOCKA_DEV_VERSION}" \
            make="${MAKE_VERSION}" \
            man-db="${MAN_DB_VERSION}"
      - name: Configure out-of-tree build
        run: |
          mkdir -p build/autotools
          cd build/autotools
          ../../configure --enable-tests CC=clang-18
      - name: Run clang gate
        run: |
          cd build/autotools
          make test

  ci-full:
    name: Full Gate
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    needs: [ci-gcc-matrix, ci-clang, ci-autotools, bench, fuzz-smoke]
    if: always()
    steps:
      - name: Assert required full-gate jobs succeeded
        run: |
          set -euo pipefail
          echo "ci-gcc-matrix=${{ needs.ci-gcc-matrix.result }}"
          echo "ci-clang=${{ needs.ci-clang.result }}"
          echo "ci-autotools=${{ needs.ci-autotools.result }}"
          echo "bench=${{ needs.bench.result }}"
          echo "fuzz-smoke=${{ needs.fuzz-smoke.result }}"
          [ "${{ needs.ci-gcc-matrix.result }}" = "success" ]
          [ "${{ needs.ci-clang.result }}" = "success" ]
          [ "${{ needs.ci-autotools.result }}" = "success" ]
          [ "${{ needs.bench.result }}" = "success" ]
          [ "${{ needs.fuzz-smoke.result }}" = "success" ]

  bench:
    name: Bench Gate
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    needs: ci-fast
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Bootstrap GNU build files
        run: ./bootstrap
      - name: Cache APT archives
        uses: actions/cache@0400d5f644dc74513175e3cd8d07132dd4860809 # v4.2.4
        with:
          path: /var/cache/apt/archives
          key: apt-24.04-bench-${{ env.LIBSODIUM_DEV_VERSION }}-${{ env.MAKE_VERSION }}
      - name: Install dependencies
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y \
            libsodium-dev="${LIBSODIUM_DEV_VERSION}" \
            make="${MAKE_VERSION}"
      - name: Configure out-of-tree build
        run: |
          mkdir -p build/autotools
          cd build/autotools
          ../../configure --enable-tests
      - name: Run stable benchmark regression gate
        run: |
          cd build/autotools
          make bench-check BENCH_REGRESSION_PCT=40 BENCH_P95_REGRESSION_PCT=70
      - name: Run cold-start advisory benchmark check
        run: |
          cd build/autotools
          make bench-check-advisory BENCH_COLD_START_REGRESSION_PCT=80 BENCH_COLD_START_P95_REGRESSION_PCT=120
      - name: Upload bench results
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: bench-results
          path: |
            build/autotools/bench-results/results-micro.json
            build/autotools/bench-results/results-spawn.json
          retention-days: 14

  fuzz-smoke:
    name: Fuzz Smoke
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    needs: ci-fast
    env:
      FUZZ_SMOKE_TIME: 30
      CLANG: clang-18
      FUZZ_CC: clang-18
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Bootstrap GNU build files
        run: ./bootstrap
      - name: Cache APT archives
        uses: actions/cache@0400d5f644dc74513175e3cd8d07132dd4860809 # v4.2.4
        with:
          path: /var/cache/apt/archives
          key: apt-24.04-fuzz-${{ env.LIBSODIUM_DEV_VERSION }}-${{ env.CLANG_VERSION }}
      - name: Install dependencies
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y \
            libsodium-dev="${LIBSODIUM_DEV_VERSION}" \
            clang-18="${CLANG_VERSION}" \
            make="${MAKE_VERSION}"
      - name: Configure out-of-tree build
        run: |
          mkdir -p build/autotools
          cd build/autotools
          ../../configure --enable-tests
      - name: Replay committed corpus and crash artifacts
        run: |
          cd build/autotools
          make fuzz-regression
      - name: Run fuzz smoke (each harness)
        run: |
          cd build/autotools
          make fuzz-smoke
      - name: Upload fuzz artifacts on failure
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: fuzz-artifacts
          path: |
            .fuzz/**/crashes
            .fuzz/**/logs
            .fuzz/**/artifacts
          retention-days: 14
          if-no-files-found: ignore
