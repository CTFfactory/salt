name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  SALT_CI_UBUNTU_VERSION: '24.04'
  SALT_CI_ALLOW_DYNAMIC_APT_REPOS: '0'

jobs:
  copilot-config:
    name: Copilot Config Gate
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Install runner prerequisites
        run: ./scripts/install-ci-runner.sh
      - name: Verify runner prerequisites
        run: ./scripts/check-ci-runner.sh
      - name: Validate Copilot customization
        run: ./scripts/validate-copilot-config.sh .

  actionlint:
    name: Workflow Lint
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    needs: copilot-config
    env:
      ACTIONLINT_VERSION: 1.7.8
      ACTIONLINT_SHA256: be92c2652ab7b6d08425428797ceabeb16e31a781c07bc388456b4e592f3e36a
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Install pinned actionlint binary
        run: |
          set -euo pipefail
          if ! command -v shellcheck >/dev/null 2>&1; then
            sudo apt-get update
            sudo DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends shellcheck
          fi
          mkdir -p tools
          tarball="tools/actionlint_${ACTIONLINT_VERSION}_linux_amd64.tar.gz"
          curl --retry 5 --retry-delay 2 --retry-connrefused --retry-max-time 120 -fsSL -o "${tarball}" \
            "https://github.com/rhysd/actionlint/releases/download/v${ACTIONLINT_VERSION}/actionlint_${ACTIONLINT_VERSION}_linux_amd64.tar.gz"
          echo "${ACTIONLINT_SHA256}  ${tarball}" | sha256sum -c -
          tar -xzf "${tarball}" -C tools actionlint
          chmod +x tools/actionlint
          rm -f "${tarball}"
      - name: Run actionlint
        run: ./tools/actionlint .github/workflows/*.yml

  ci-fast:
    name: Fast Gate
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    needs: actionlint
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Install runner prerequisites
        run: ./scripts/install-ci-runner.sh
      - name: Verify runner prerequisites
        run: ./scripts/check-ci-runner.sh
      - name: Bootstrap GNU build files
        run: ./bootstrap
      - name: Configure out-of-tree build
        run: |
          mkdir -p build/autotools
          cd build/autotools
          ../../configure --enable-tests
      - name: Run fast gate
        run: |
          cd build/autotools
          make ci-fast

  ci-gcc-matrix:
    name: GCC Matrix (v${{ matrix.gcc_version }})
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    needs: ci-fast
    strategy:
      fail-fast: false
      matrix:
        gcc_version: [9, 10, 11, 12, 13]
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Install runner prerequisites
        run: ./scripts/install-ci-runner.sh
      - name: Verify runner prerequisites
        run: ./scripts/check-ci-runner.sh
      - name: Bootstrap GNU build files
        run: ./bootstrap
      - name: Configure out-of-tree build
        run: |
          mkdir -p build/autotools
          cd build/autotools
          ../../configure --enable-tests CC="gcc-${{ matrix.gcc_version }}"
      - name: Run tests with matrix compiler
        run: |
          cd build/autotools
          make test

  ci-clang-matrix:
    name: Clang Matrix (v${{ matrix.clang_version }})
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    needs: ci-fast
    strategy:
      fail-fast: false
      matrix:
        clang_version: [14, 15, 16, 17, 18]
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Install runner prerequisites
        run: ./scripts/install-ci-runner.sh
      - name: Verify runner prerequisites
        run: ./scripts/check-ci-runner.sh
      - name: Bootstrap GNU build files
        run: ./bootstrap
      - name: Configure out-of-tree build
        run: |
          mkdir -p build/autotools
          cd build/autotools
          ../../configure --enable-tests CC="clang-${{ matrix.clang_version }}"
      - name: Run clang matrix gate
        run: |
          cd build/autotools
          make test

  ci-autotools:
    name: Full Gate (GNU Autotools)
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    needs: ci-fast
    env:
      CLANG: clang-18
      FUZZ_CC: clang-18
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Install runner prerequisites
        run: ./scripts/install-ci-runner.sh
      - name: Verify runner prerequisites
        run: ./scripts/check-ci-runner.sh
      - name: Run Autotools full CI gate
        run: |
          set -euo pipefail
          ./bootstrap
          mkdir -p build/autotools
          cd build/autotools
          ../../configure --enable-tests
          make ci
      - name: Upload diagnostics on failure
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ci-diagnostics
          path: |
            build/autotools/gcovr.txt
            build/autotools/gcov_blocks.txt
            build/autotools/*.gcov.json.gz
          retention-days: 7

  bench:
    name: Bench Gate
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    needs: ci-autotools
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Install runner prerequisites
        run: ./scripts/install-ci-runner.sh
      - name: Verify runner prerequisites
        run: ./scripts/check-ci-runner.sh
      - name: Bootstrap GNU build files
        run: ./bootstrap
      - name: Configure out-of-tree build
        run: |
          mkdir -p build/autotools
          cd build/autotools
          ../../configure --enable-tests
      - name: Run stable benchmark regression gate
        run: |
          cd build/autotools
          make bench-check BENCH_REGRESSION_PCT=40 BENCH_P95_REGRESSION_PCT=70
      - name: Run cold-start advisory benchmark check
        run: |
          cd build/autotools
          make bench-check-advisory BENCH_COLD_START_REGRESSION_PCT=80 BENCH_COLD_START_P95_REGRESSION_PCT=120
      - name: Upload bench results
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: bench-results
          path: |
            build/autotools/bench-results/results-micro.json
            build/autotools/bench-results/results-spawn.json
          retention-days: 14

  fuzz-smoke:
    name: Fuzz Smoke
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    needs: ci-autotools
    env:
      FUZZ_SMOKE_TIME: 30
      CLANG: clang-18
      FUZZ_CC: clang-18
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Install runner prerequisites
        run: ./scripts/install-ci-runner.sh
      - name: Verify runner prerequisites
        run: ./scripts/check-ci-runner.sh
      - name: Bootstrap GNU build files
        run: ./bootstrap
      - name: Configure out-of-tree build
        run: |
          mkdir -p build/autotools
          cd build/autotools
          ../../configure --enable-tests
      - name: Replay committed corpus and crash artifacts
        run: |
          cd build/autotools
          make fuzz-regression
      - name: Run fuzz smoke (each harness)
        run: |
          cd build/autotools
          make fuzz-smoke
      - name: Upload fuzz artifacts on failure
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: fuzz-artifacts
          path: |
            .fuzz/**/crashes
            .fuzz/**/logs
            .fuzz/**/artifacts
          retention-days: 14
          if-no-files-found: ignore

  ci-full:
    name: Full Gate
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    needs: [ci-gcc-matrix, ci-clang-matrix, ci-autotools, bench, fuzz-smoke]
    if: always()
    steps:
      - name: Assert required full-gate jobs succeeded
        run: |
          set -euo pipefail
          echo "ci-gcc-matrix=${{ needs.ci-gcc-matrix.result }}"
          echo "ci-clang-matrix=${{ needs.ci-clang-matrix.result }}"
          echo "ci-autotools=${{ needs.ci-autotools.result }}"
          echo "bench=${{ needs.bench.result }}"
          echo "fuzz-smoke=${{ needs.fuzz-smoke.result }}"
          [ "${{ needs.ci-gcc-matrix.result }}" = "success" ]
          [ "${{ needs.ci-clang-matrix.result }}" = "success" ]
          [ "${{ needs.ci-autotools.result }}" = "success" ]
          [ "${{ needs.bench.result }}" = "success" ]
          [ "${{ needs.fuzz-smoke.result }}" = "success" ]
