name: salt
arch: amd64
platform: linux
version: ${SALT_PACKAGE_VERSION}
release: ${SALT_PACKAGE_RELEASE}
version_schema: semver
section: utils
priority: optional
maintainer: CTFfactory <noreply@ctffactory.com>
description: libsodium sealed-box CLI for GitHub Actions Secrets workflows
vendor: CTFfactory
homepage: https://github.com/CTFfactory/salt
license: Unlicense
depends:
  - libsodium23
contents:
  - src: ${SALT_PACKAGE_BIN}
    dst: /usr/bin/salt
    expand: true
    file_info:
      mode: 0755
  - src: ${SALT_PACKAGE_MANPAGE}
    dst: /usr/share/man/man1/salt.1.gz
    expand: true
    file_info:
      mode: 0644
